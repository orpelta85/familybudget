<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Icon: house + upward arrow combined -->
  <g transform="translate(0, 2)">
    <!-- House base -->
    <rect x="6" y="18" width="20" height="16" rx="2" fill="oklch(0.65 0.18 250)" opacity="0.15"/>
    <!-- House roof -->
    <path d="M2 19L16 6L30 19" stroke="oklch(0.65 0.18 250)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Growth arrow inside house -->
    <path d="M10 30L16 18L22 24L28 12" stroke="oklch(0.70 0.18 145)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Arrow tip -->
    <path d="M25 12L28 12L28 15" stroke="oklch(0.70 0.18 145)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Text -->
  <text x="40" y="17" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="oklch(0.92 0.01 250)" letter-spacing="-0.02em">My Family</text>
  <text x="40" y="33" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="oklch(0.55 0.01 250)" letter-spacing="0.04em">Finance</text>
</svg>
