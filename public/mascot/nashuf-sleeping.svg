<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Body (slightly tilted for sleep) -->
  <g transform="rotate(5 60 68)">
    <ellipse cx="60" cy="68" rx="32" ry="36" fill="#3d3470"/>
    <ellipse cx="60" cy="76" rx="20" ry="22" fill="#d4ccb8"/>
  </g>
  <!-- Ear tufts left -->
  <path d="M40 38 L34 24 L42 32Z" fill="#3d3470"/>
  <path d="M44 35 L40 22 L46 30Z" fill="#3d3470"/>
  <!-- Ear tufts right -->
  <path d="M84 36 L90 24 L84 30Z" fill="#3d3470"/>
  <path d="M80 34 L86 22 L80 28Z" fill="#3d3470"/>
  <!-- Face disc (tilted) -->
  <g transform="rotate(5 60 56)">
    <ellipse cx="60" cy="56" rx="26" ry="22" fill="#d4ccb8"/>
  </g>
  <!-- Closed left eye -->
  <path d="M40 55 Q48 50 56 55" stroke="#3d3470" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Closed right eye -->
  <path d="M66 54 Q74 49 82 54" stroke="#3d3470" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Glasses frame -->
  <ellipse cx="48" cy="54" rx="12" ry="10" stroke="#b5a050" stroke-width="1.8" fill="none"/>
  <ellipse cx="74" cy="53" rx="12" ry="10" stroke="#b5a050" stroke-width="1.8" fill="none"/>
  <path d="M60.5 52 Q61 49 61.5 52" stroke="#b5a050" stroke-width="1.5" fill="none"/>
  <line x1="36" y1="54" x2="28" y2="56" stroke="#b5a050" stroke-width="1.5"/>
  <line x1="86" y1="53" x2="94" y2="54" stroke="#b5a050" stroke-width="1.5"/>
  <!-- Sleepy eyebrows -->
  <path d="M40 48 Q48 46 56 48" stroke="#3d3470" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M66 47 Q74 45 82 47" stroke="#3d3470" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M58 63 L61 68 L64 63Z" fill="#c4943a"/>
  <!-- Sleeping mouth (small o) -->
  <ellipse cx="61" cy="71" rx="2.5" ry="2" fill="#b5944a" opacity="0.5"/>
  <!-- Left wing (down, relaxed) -->
  <path d="M28 64 Q22 76 28 88 Q30 82 32 76Z" fill="#3d3470"/>
  <!-- Right wing (down, relaxed) -->
  <path d="M94 63 Q100 75 94 87 Q92 81 90 75Z" fill="#3d3470"/>
  <!-- Zzz -->
  <text x="88" y="30" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14" fill="#2bb5a0" opacity="0.8">Z</text>
  <text x="96" y="20" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" fill="#2bb5a0" opacity="0.6">z</text>
  <text x="102" y="12" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="8" fill="#2bb5a0" opacity="0.4">z</text>
  <!-- Feet -->
  <path d="M50 103 L46 109 M50 103 L50 109 M50 103 L54 109" stroke="#c4943a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M74 103 L70 109 M74 103 L74 109 M74 103 L78 109" stroke="#c4943a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Branch/line -->
  <line x1="20" y1="108" x2="100" y2="108" stroke="#4a4270" stroke-width="2" stroke-linecap="round"/>
</svg>
