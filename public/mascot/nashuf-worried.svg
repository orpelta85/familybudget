<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Body (slightly tilted) -->
  <g transform="rotate(-5 60 68)">
    <ellipse cx="60" cy="68" rx="32" ry="36" fill="#3d3470"/>
    <!-- Belly -->
    <ellipse cx="60" cy="76" rx="20" ry="22" fill="#d4ccb8"/>
  </g>
  <!-- Ear tufts left -->
  <path d="M36 38 L28 24 L38 32Z" fill="#3d3470"/>
  <path d="M40 35 L34 22 L42 30Z" fill="#3d3470"/>
  <!-- Ear tufts right -->
  <path d="M80 34 L88 22 L80 30Z" fill="#3d3470"/>
  <path d="M76 32 L82 20 L76 28Z" fill="#3d3470"/>
  <!-- Face disc (tilted) -->
  <g transform="rotate(-5 60 56)">
    <ellipse cx="60" cy="56" rx="26" ry="22" fill="#d4ccb8"/>
  </g>
  <!-- Left eye white (squinting) -->
  <ellipse cx="47" cy="55" rx="10" ry="8" fill="#f0ede6"/>
  <!-- Right eye white -->
  <ellipse cx="73" cy="53" rx="10" ry="10" fill="#f0ede6"/>
  <!-- Left iris -->
  <circle cx="47" cy="55" r="5" fill="#2bb5a0"/>
  <!-- Right iris -->
  <circle cx="73" cy="53" r="6" fill="#2bb5a0"/>
  <!-- Left pupil -->
  <circle cx="48" cy="54" r="2.5" fill="#1a1530"/>
  <!-- Right pupil -->
  <circle cx="74" cy="52" r="3" fill="#1a1530"/>
  <!-- Left eye sparkle -->
  <circle cx="45" cy="52" r="1.2" fill="#fff"/>
  <!-- Right eye sparkle -->
  <circle cx="71" cy="50" r="1.5" fill="#fff"/>
  <!-- Glasses frame -->
  <ellipse cx="47" cy="55" rx="12" ry="10" stroke="#b5a050" stroke-width="1.8" fill="none"/>
  <circle cx="73" cy="53" r="12" stroke="#b5a050" stroke-width="1.8" fill="none"/>
  <path d="M59 53 Q60 50 61 52" stroke="#b5a050" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="55" x2="26" y2="57" stroke="#b5a050" stroke-width="1.5"/>
  <line x1="85" y1="53" x2="94" y2="52" stroke="#b5a050" stroke-width="1.5"/>
  <!-- Worried eyebrows — one up, one down -->
  <path d="M38 44 Q47 48 56 44" stroke="#3d3470" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 42 Q72 37 82 40" stroke="#3d3470" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M56 63 L59 68 L62 63Z" fill="#c4943a"/>
  <!-- Worried mouth -->
  <path d="M54 70 Q59 67 64 70" stroke="#b5944a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Left wing (slightly out) -->
  <path d="M26 64 Q20 74 26 86 Q28 80 30 74Z" fill="#3d3470"/>
  <!-- Right wing (slightly out) -->
  <path d="M94 62 Q100 72 94 84 Q92 78 90 72Z" fill="#3d3470"/>
  <!-- Feet -->
  <path d="M46 103 L42 109 M46 103 L46 109 M46 103 L50 109" stroke="#c4943a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M74 102 L70 108 M74 102 L74 108 M74 102 L78 108" stroke="#c4943a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Branch/line -->
  <line x1="20" y1="108" x2="100" y2="108" stroke="#4a4270" stroke-width="2" stroke-linecap="round"/>
</svg>
