  <!-- Ear tufts left -->
  <path d="M38 31 L30 15 L40 25Z" fill="#3d3470"/>
  <path d="M42 28 L36 13 L44 23Z" fill="#3d3470"/>
  <path d="M34 34 L26 20 L36 28Z" fill="#3d3470"/>
  <!-- Ear tufts right -->
  <path d="M82 31 L90 15 L80 25Z" fill="#3d3470"/>
  <path d="M78 28 L84 13 L76 23Z" fill="#3d3470"/>
  <path d="M86 34 L94 20 L84 28Z" fill="#3d3470"/>
  <!-- Face disc -->
  <ellipse cx="60" cy="51" rx="26" ry="22" fill="#d4ccb8"/>
  <!-- Left eye white -->
  <ellipse cx="48" cy="49" rx="10" ry="10" fill="#f0ede6"/>
  <!-- Right eye white -->
  <ellipse cx="72" cy="49" rx="10" ry="10" fill="#f0ede6"/>
  <!-- Star eyes left -->
  <polygon points="48,43 49.5,47 53.5,47 50.5,49.5 51.5,53.5 48,51 44.5,53.5 45.5,49.5 42.5,47 46.5,47" fill="#b5a050"/>
  <!-- Star eyes right -->
  <polygon points="72,43 73.5,47 77.5,47 74.5,49.5 75.5,53.5 72,51 68.5,53.5 69.5,49.5 66.5,47 70.5,47" fill="#b5a050"/>
  <!-- Star eye sparkle -->
  <circle cx="46" cy="46" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="70" cy="46" r="1.5" fill="#fff" opacity="0.8"/>
  <!-- Glasses frame -->
  <circle cx="48" cy="49" r="12" stroke="#b5a050" stroke-width="1.8" fill="none"/>
  <circle cx="72" cy="49" r="12" stroke="#b5a050" stroke-width="1.8" fill="none"/>
  <path d="M60.5 47 Q60 44 59.5 47" stroke="#b5a050" stroke-width="1.5" fill="none"/>
  <line x1="36" y1="49" x2="26" y2="46" stroke="#b5a050" stroke-width="1.5"/>
  <line x1="84" y1="49" x2="94" y2="46" stroke="#b5a050" stroke-width="1.5"/>
  <!-- Excited eyebrows (high) -->
  <path d="M38 34 Q48 29 56 34" stroke="#3d3470" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 34 Q72 29 82 34" stroke="#3d3470" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M57 57 L60 62 L63 57Z" fill="#c4943a"/>
  <!-- Big celebratory smile -->
  <path d="M52 63 Q60 69 68 63" stroke="#b5944a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Left wing UP HIGH -->
  <path d="M24 48 Q12 32 20 20 Q24 34 28 44Z" fill="#3d3470"/>
  <!-- Right wing UP HIGH -->
  <path d="M96 48 Q108 32 100 20 Q96 34 92 44Z" fill="#3d3470"/>
  <!-- Feet -->
  <path d="M48 97 L44 103 M48 97 L48 103 M48 97 L52 103" stroke="#c4943a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M72 97 L68 103 M72 97 L72 103 M72 97 L76 103" stroke="#c4943a" stroke-width="1.5" stroke-linecap="round"/>
